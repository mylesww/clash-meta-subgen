  - name: 🇯🇵 日本节点
    type: url-test
    test:
      url: "http://www.gstatic.com/generate_204"
      interval: 120
      tolerance: 20
    members:
      - type: nodeMatch
        pattern: "(日本|川日|东京|大阪|泉日|埼玉|沪日|深日|JP|Japan)"
        excludeTags:
          - provider-b
  - name: 🇺🇲 美国节点
    type: url-test
    test:
      url: "http://www.gstatic.com/generate_204"
      interval: 120
      tolerance: 40
    members:
      - type: nodeMatch
        pattern: "(美国|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|US|United States)"
  - name: 🇨🇳 台湾节点
    type: url-test
    test:
      url: "http://www.gstatic.com/generate_204"
      interval: 120
      tolerance: 20
    members:
      - type: nodeMatch
        pattern: "(台|新北|彰化|TW|Taiwan)"
  - name: 🇸🇬 狮城节点
    type: url-test
    test:
      url: "http://www.gstatic.com/generate_204"
      interval: 120
      tolerance: 20
    members:
      - type: nodeMatch
        pattern: "(新加坡|坡|狮城|SG|Singapore)"
  - name: 🇰🇷 韩国节点
    type: url-test
    test:
      url: "http://www.gstatic.com/generate_204"
      interval: 120
      tolerance: 20
    members:
      - type: nodeMatch
        pattern: "(KR|Korea|KOR|首尔|韩|韓)"
  - name: ✅ 家宽节点
    type: select
    members:
      - type: nodeMatch
        pattern: ".*(家宽|无线|住宅)"
