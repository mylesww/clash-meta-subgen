# 订阅源列表。每个订阅源最终会被拉取并参与后续的节点分组。
subs:
  - url: "https://subscribe.example.com/api/v1/client/subscribe?token=YOUR_SUB_TOKEN"
    tag: provider-a
  - url: "https://assets.example.com/subs/provider-b.yaml"
    tag: provider-b

# 可选：对所有订阅源统一应用的节点名排除正则。
# 命中后会在导入阶段直接丢弃，发生在重命名前。
exclude: "(试用|过期|到期|剩余流量|重置|官网)"

