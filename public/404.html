<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>404</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f3efe6;
        --ink: #1f2b23;
        --muted: #5f6b62;
        --line: #d7d0c3;
        --card: #fffdf8;
        --accent: #0e6b50;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(14, 107, 80, 0.12), transparent 28%),
          linear-gradient(180deg, #f8f5ee 0%, var(--bg) 100%);
        color: var(--ink);
      }
      article {
        width: min(680px, 100%);
        padding: 32px;
        border: 1px solid var(--line);
        border-radius: 24px;
        background: var(--card);
        box-shadow: 0 20px 50px rgba(24, 34, 28, 0.08);
      }
      h1 {
        margin: 0 0 12px;
        font-size: clamp(42px, 10vw, 84px);
        line-height: 0.9;
        letter-spacing: -0.05em;
      }
      p {
        margin: 0 0 16px;
        line-height: 1.7;
        color: var(--muted);
      }
      a {
        color: var(--accent);
        text-decoration: none;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <article>
      <h1>404</h1>
      <p>页面不存在。</p>
      <p><a href="/">返回首页</a></p>
    </article>
  </body>
</html>
